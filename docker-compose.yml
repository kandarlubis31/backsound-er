services:
  postgres:
    image: postgres:16-alpine
    container_name: backsounder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: backsounder
      POSTGRES_USER: backsounder
      POSTGRES_PASSWORD: backsounder
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backsounder -d backsounder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backsound-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: backsounder-web
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "postgresql://backsounder:backsounder@postgres:5432/backsounder"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backsound-network

networks:
  backsound-network:
    driver: bridge

volumes:
  pgdata:
